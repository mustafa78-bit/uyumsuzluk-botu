name: Divergence Scan

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: python3 -m pip install -r requirements.txt

      - name: Run divergence scan
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_ONCE: "true"
          DIVERGENCE_TIMEFRAMES: "4h,1d,1w"

          USE_SCORE_FILTER: "true"
          MIN_SIGNAL_SCORE: "5"
          EMA_TREND_MODE: "soft"
          EMA_FAST_LEN: "20"
          EMA_SLOW_LEN: "50"
          EMA_TOUCH_PCT: "3.0"
          ATR_LEN: "14"
          ATR_MIN_PCT: "0.5"
          ATR_MAX_PCT: "12.0"
          MOMENTUM_LOOKBACK: "3"
          RVOL_LEN: "20"
          RVOL_MIN: "1.2"
          USE_RVOL_FILTER: "false"
        run: python3 elite_divergence_hl_scanner_v3.py
