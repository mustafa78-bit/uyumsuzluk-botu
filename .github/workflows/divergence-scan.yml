name: Divergence Scan

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: python3 -m pip install -r requirements.txt

      - name: Run divergence scan
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_ONCE: "true"
          SCAN_INTERVAL: "14400"
          DIVERGENCE_TIMEFRAMES: "4h,1d,1w"
        run: python3 elite_divergence_hl_scanner_v3.py
